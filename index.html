<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>
<body>
<header>
    <h1>Character Counter</h1>
    <button>⚙️</button>
</header>

<main class="container">
  <section class="hero">
    <h1>Analyze your text in real-time.</h1>
    <textarea id="text-input">
       Lorem ipsum dolor sit amet consectetur adipisicing elit. Eligendi consequuntur, placeat rem similique ut eaque autem commodi tempore nobis tenetur quo accusamus qui. Consectetur repellat exercitationem nobis odio est voluptatibus facere debitis laudantium iste quae voluptatum, dignissimos accusamus, fugit adipisci! Culpa ex soluta porro amet asperiores tempore, nostrum nam incidunt.
    </textarea>
  </section>

  <section class="controls">
    <div class="checkbox-group">

    <div>
    <input type="checkbox">
    <label>Exclude Spaces</label>
    </div>

    <div>
    <input type="checkbox">
    <label>Set Character Limit</label>
    </div>

  </div>


  <p>Approx. reading time: &lt;1 minute</p>

</section>

  <section class="stats">
  
    <div class="card purple">
  <h2>278</h2>
  <p>Total Characters</p>
</div>

<div class="card coral">
  <h2>39</h2>
  <p>Word Count</p>
</div>

<div class="card orange">
  <h2>04</h2>
  <p>Sentence Count</p>
</div>
</section>
<section class="letter-density">

  <h2>Letter Density</h2>

  <div class="density-item">
    <span>E</span>

    <div class="bar-container">
      <div class="bar e-bar"></div>
    </div>

    <span>40 (16.06%)</span>
  </div>

  <div class="density-item">
    <span>I</span>

    <div class="bar-container">
      <div class="bar i-bar"></div>
    </div>

    <span>29 (11.65%)</span>
  </div>

  <div class="density-item">
    <span>T</span>

    <div class="bar-container">
      <div class="bar t-bar"></div>
    </div>

    <span>28 (11.24%)</span>
  </div>

  <div class="density-item">
    <span>O</span>

    <div class="bar-container">
      <div class="bar o-bar"></div>
    </div>

    <span>22 (8.84%)</span>
  </div>

  <div class="density-item">
    <span>N</span>

    <div class="bar-container">
      <div class="bar n-bar"></div>
    </div>

    <span>21 (8.43%)</span>
  </div>

</section>
</main>
</body>
</html>
